<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 DownloadeR</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #999999);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; text-align: center;
        }
        .container { max-width: 400px; margin: 0 auto; padding-top: 20px; }
        h2 { font-size: 22px; margin-bottom: 5px; }
        p { color: var(--hint-color); font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid var(--hint-color); border-radius: 10px;
            background: transparent; color: var(--text-color);
            font-size: 16px; margin-bottom: 15px; outline: none;
        }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background-color: var(--button-color); color: var(--button-text);
            font-size: 16px; font-weight: bold; cursor: pointer; display: block;
            text-decoration: none; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Müzik İndirici</h2>
        <p>YouTube linkini yapıştırıp MP3 olarak indirin.</p>
        
        <!-- 🌟 KESİN ÇÖZÜM: JavaScript kullanmıyoruz. 
             Doğrudan HTML Form yapısı ile Telegram'ın resmi paylaşım servisini tetikliyoruz. -->
        <form id="share-form" action="https://t.me" method="GET">
            <input type="text" id="url-input" name="url" placeholder="https://youtube.com..." required>
            <button type="submit" onclick="closeAppDelayed()">🎵 MP3 Olarak Dönüştür</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function closeAppDelayed() {
            // Butona basıldığı an form yönlendirmesini yapar, yarım saniye sonra da ekranı kapatır.
            setTimeout(() => { tg.close(); }, 500);
        }
    </script>
</body>
</html>
