<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 Downloader</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #999999);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; text-align: center;
        }
        .container { max-width: 400px; margin: 0 auto; padding-top: 20px; }
        h2 { font-size: 22px; margin-bottom: 5px; }
        p { color: var(--hint-color); font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid var(--hint-color); border-radius: 10px;
            background: transparent; color: var(--text-color);
            font-size: 16px; margin-bottom: 15px; outline: none;
        }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background-color: var(--button-color); color: var(--button-text);
            font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;
        }
        .status { margin-top: 15px; font-weight: bold; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Müzik İndirici</h2>
        <p>YouTube linkini yapıştırıp MP3 olarak indirin.</p>
        <input type="text" id="url-input" placeholder="https://youtube.com...">
        <button id="main-btn" onclick="sendLinkToBot()">🎵 MP3 Olarak Dönüştür</button>
        <div id="status-text" class="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendLinkToBot() {
            const urlInput = document.getElementById('url-input').value;
            const statusDiv = document.getElementById('status-text');
            const btn = document.getElementById('main-btn');
            
            if(!urlInput) return;
            
            const cleanUrl = String(urlInput).trim();
            const userId = tg.initDataUnsafe?.user?.id;
            
            if(!userId) {
                alert("Telegram kullanıcı bilgisi alınamadı!");
                return;
            }

            btn.disabled = true;
            statusDiv.style.display = "block";
            statusDiv.innerText = "⏳ İşlem sırasına alınıyor, lütfen bekleyin...";

            // 🌟 KESİN ÇÖZÜM: Telegram'ın tg.sendData kısıtlamasını aşmak için
            // Veriyi doğrudan resmi Telegram API üzerinden bota mesaj olarak fırlatıyoruz.
            // Bu sayede bilgisayarınız dış dünyaya kapalı olsa bile Telegram sunucuları mesajı Debian'a iletir.
            // ⚠️ BURAYA KENDİ BOT TOKENINIZI YAZIN:
            const botToken = "8869529049:AAGP2OzUWYC539uIB_nje_jYAlqs34fBOiM"; 
            
            const telegramApiUrl = `https://telegram.org{botToken}/sendMessage`;
            
            fetch(telegramApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: userId,
                    text: cleanUrl
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    statusDiv.innerText = "✅ Başarılı! Dönüştürme başlatıldı. Sayfa kapanıyor...";
                    setTimeout(() => { tg.close(); }, 1500);
                } else {
                    statusDiv.innerText = "❌ Mesaj gönderilemedi. Lütfen önce bota en az bir mesaj yazın.";
                    btn.disabled = false;
                }
            })
            .catch(() => {
                statusDiv.innerText = "❌ Bağlantı hatası oluştu.";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
