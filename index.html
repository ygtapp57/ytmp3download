<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium mP3 Converter</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0e0e10; color: #ffffff; text-align: center; padding: 50px 20px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: #18181b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid #27272a; }
        h1 { font-size: 24px; color: #a855f7; margin-bottom: 8px; }
        p { color: #71717a; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 16px; box-sizing: border-box; border: 2px solid #27272a; border-radius: 10px; background: #09090b; color: #fff; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: #a855f7; }
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; background: #a855f7; color: #ffffff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c084fc; transform: translateY(-1px); }
        button:disabled { background: #27272a; color: #52525b; cursor: not-allowed; transform: none; }
        .progress-area { margin-top: 25px; display: none; text-align: left; }
        .progress-status { font-size: 14px; font-weight: bold; color: #e4e4e7; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .progress-bar-bg { width: 100%; height: 10px; background: #27272a; border-radius: 20px; overflow: hidden; }
        .progress-bar-fill { width: 0%; height: 10px; background: linear-gradient(90deg, #a855f7, #6366f1); border-radius: 20px; transition: width 0.4s ease; }
    </style>
</head>
<body>

<div class="container">
    <h1>Müzik İndirme Merkezi</h1>
    <p>YouTube veya YT Music linkini girin, anında tarayıcınıza indirin.</p>
    
    <input type="text" id="url-input" placeholder="https://youtube.com...">
    <button id="btn">⚡ MP3 Olarak İndir</button>
    
    <div id="progress-zone" class="progress-area">
        <div class="progress-status">
            <span id="status-text">Analiz ediliyor...</span>
            <span id="percent-text">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="bar-fill" class="progress-bar-fill"></div>
        </div>
    </div>
</div>

<script>
// 🌟 Kesin Çözüm: Butonun tıklama olayını HTML içinden değil, JavaScript içinden doğrudan bağlıyoruz.
// Böylece "is not defined" (tanımlanmadı) hatası alma ihtimali tamamen ortadan kalkıyor.
document.getElementById('btn').addEventListener('click', function() {
    const url = document.getElementById('url-input').value.trim();
    const pZone = document.getElementById('progress-zone');
    const bFill = document.getElementById('bar-fill');
    const sText = document.getElementById('status-text');
    const pText = document.getElementById('percent-text');
    const btn = document.getElementById('btn');

    if(!url) { alert("Lütfen link girin!"); return; }

    btn.disabled = true;
    pZone.style.display = "block";
    
    // Aşama 1: Başlangıç
    sText.innerText = "🔍 Video analiz ediliyor (Max 7 Dk)...";
    pText.innerText = "15%";
    bFill.style.width = "15%";

    // Tünel Adresiniz
    const apiEndpoint = "https://lhr.life";

    fetch(apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
    })
    .then(res => {
        if (!res.ok) throw new Error("İndirme motoru hatası veya süre sınırı engeli.");
        sText.innerText = "📥 MP3 dönüştürülüyor...";
        pText.innerText = "60%";
        bFill.style.width = "60%";
        return res.blob();
    })
    .then(blob => {
        sText.innerText = "📤 Dosya tarayıcıya aktarılıyor...";
        pText.innerText = "95%";
        bFill.style.width = "95%";
        
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = "music.mp3";
        document.body.appendChild(a);
        a.click();
        a.remove();

        sText.innerText = "✅ İndirme Tamamlandı!";
        pText.innerText = "100%";
        bFill.style.width = "100%";
        setTimeout(() => { btn.disabled = false; pZone.style.display = "none"; }, 3000);
    })
    .catch(err => {
        sText.innerText = "❌ Hata: " + err.message;
        pText.innerText = "0%";
        bFill.style.width = "0%";
        bFill.style.backgroundColor = "#eb4444";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
